name: Auto Pilot Fast News Updater

on:
  workflow_dispatch: # Allows you to trigger manually
  schedule:
    - cron: '0 * * * *' # Automatically runs every single hour

jobs:
  scrape_and_post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Upgraded to Node 20+ compliant version

    - name: Set up Python
      uses: actions/setup-python@v5 # Upgraded to modern environment step
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-generativeai

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python .github/scripts/fetch_news.py

    - name: Commit and Push Database Updates
      run: |
        git config --global user.name "ajay1020"
        git config --global user.name "ajay1020"
        git config --global user.email "ajay1020@users.noreply.github.com"
        git add news.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Autopilot: Injected breaking news summaries [skip ci]" && git push)
