<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST NEWS</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: #4da6ff;
            --accent-yellow: #ffb300;
            --search-bg: #262626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            color: var(--accent-yellow);
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #3a3a3c;
            color: var(--text-main);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: #262626;
            border-color: var(--text-muted);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .search-box {
            background-color: var(--search-bg);
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .search-box::placeholder {
            color: #555559;
        }

        .nav-tabs {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid #262626;
            padding-bottom: 8px;
            overflow-x: auto;
        }

        .tab {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding-bottom: 8px;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
        }

        #news-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .news-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 4px solid var(--accent-blue);
            position: relative;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .category-tag {
            color: var(--accent-blue);
            letter-spacing: 0.5px;
        }

        .timestamp {
            color: var(--text-muted);
        }

        .news-title {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
        }

        .news-title a {
            color: var(--text-main);
            text-decoration: none;
        }

        .news-title a:hover {
            color: var(--accent-blue);
        }

        .news-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .share-btn {
            background-color: #262626;
            color: var(--text-main);
            border: none;
            border-radius: 14px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-container">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Fast News</span>
            </div>
            <button id="refresh-btn" class="refresh-btn">Sync Feed</button>
        </header>

        <input type="text" id="search-bar" class="search-box" placeholder="Search breaking stories...">

        <div class="nav-tabs">
            <div class="tab active" data-category="all">All</div>
            <div class="tab" data-category="tech">Tech</div>
            <div class="tab" data-category="sports">Sports</div>
            <div class="tab" data-category="general">General</div>
        </div>

        <div id="news-container">
            <div class="status-msg">Loading stories...</div>
        </div>
    </div>

    <script>
        const refreshBtn = document.getElementById('refresh-btn');
        const newsContainer = document.getElementById('news-container');
        const searchBar = document.getElementById('search-bar');
        const tabs = document.querySelectorAll('.tab');

        let allArticles = [];
        let currentCategory = 'all';

        function fetchFeed() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Updating...';
            newsContainer.innerHTML = '<div class="status-msg">Fetching latest breaking news...</div>';

            // Cache buster appended to avoid old browser cache when JSON updates
            fetch('news.json?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error('Data fetch failed');
                    return response.json();
                })
                .then(data => {
                    allArticles = Array.isArray(data) ? data : (data.articles || []);
                    renderFeed();
                })
                .catch(err => {
                    console.error(err);
                    newsContainer.innerHTML = '<div class="status-msg" style="color: #ff4d4d;">Failed to sync news feed. Please try again.</div>';
                })
                .finally(() => {
                    refreshBtn.disabled = false;
                    refreshBtn.textContent = 'Sync Feed';
                });
        }

        function renderFeed() {
            const searchQuery = searchBar.value.toLowerCase().trim();
            newsContainer.innerHTML = '';

            const filtered = allArticles.filter(item => {
                const matchesCategory = currentCategory === 'all' || 
                    (item.category && item.category.toLowerCase() === currentCategory);
                
                // Mapped to look at item.headline and item.summary from your JSON structure
                const matchesSearch = !searchQuery || 
                    (item.headline && item.headline.toLowerCase().includes(searchQuery)) || 
                    (item.summary && item.summary.toLowerCase().includes(searchQuery));

                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                newsContainer.innerHTML = '<div class="status-msg">No stories found matching your criteria.</div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                
                // Clean up any weird character patterns in the date string (like \u2022 bullet points)
                let cleanDate = item.date ? item.date.replace(/\\u2022/g, '•') : 'JUST NOW';

                if(item.category && item.category.toLowerCase() === 'sports') {
                    card.style.borderLeftColor = '#2da44e';
                } else if (item.category && item.category.toLowerCase() === 'general') {
                    card.style.borderLeftColor = '#ffb300';
                }

                // Strictly mapping to your exact JSON keys: item.headline, item.summary, item.link, item.category, item.date
                card.innerHTML = `
                    <div class="card-meta">
                        <span class="category-tag">${item.category || 'NEWS'}</span>
                        <span class="timestamp">${cleanDate}</span>
                    </div>
                    <h2 class="news-title">
                        ${item.link ? `<a href="${item.link}" target="_blank">${item.headline}</a>` : (item.headline || 'Untitled Story')}
                    </h2>
                    <p class="news-desc">${item.summary || 'No description provided.'}</p>
                    <div class="card-footer">
                        <button class="share-btn">➔ Share</button>
                    </div>
                `;
                newsContainer.appendChild(card);
            });
        }

        refreshBtn.addEventListener('click', fetchFeed);
        searchBar.addEventListener('input', renderFeed);

        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                renderFeed();
            });
        });

        window.addEventListener('DOMContentLoaded', fetchFeed);
    </script>
</body>
</html>
